services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-creator_ops}
      POSTGRES_USER: ${POSTGRES_USER:-creator_ops}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    volumes:
      - creator_ops_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: .
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-creator_ops}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-creator_ops}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:?set BETTER_AUTH_URL in .env}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?set BETTER_AUTH_SECRET in .env}
      AUTOMATION_SECRET: ${AUTOMATION_SECRET:?set AUTOMATION_SECRET in .env}
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3000
    ports:
      - "${APP_PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  migrate:
    build:
      context: .
      target: migrate
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-creator_ops}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-creator_ops}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  automation:
    image: alpine:3.22
    restart: unless-stopped
    environment:
      AUTOMATION_SECRET: ${AUTOMATION_SECRET:?set AUTOMATION_SECRET in .env}
    command: ["/bin/sh", "-c", "while true; do wget -qO- --header=\"Authorization: Bearer $$AUTOMATION_SECRET\" --post-data='' http://web:3000/api/internal/automations/tick || true; sleep 3600; done"]
    depends_on:
      web:
        condition: service_healthy

volumes:
  creator_ops_postgres:
