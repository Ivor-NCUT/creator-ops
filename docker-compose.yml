services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: creator_ops
      POSTGRES_USER: creator_ops
      POSTGRES_PASSWORD: creator_ops
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - creator_ops_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U creator_ops -d creator_ops"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  creator_ops_postgres:
